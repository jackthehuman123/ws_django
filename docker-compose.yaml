services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 5

  daphne:
    build: ./ws_django
    ports:
      - "8000:8000"
    command: sh -c "python manage.py migrate && daphne -b 0.0.0.0 -p 8000 my_project.asgi:application"
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=my_project.settings
      - PYTHONUNBUFFERED=1

volumes:
  postgres_data: {}
